name: Auto Sync TVBox Files

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Download yingshicang.json (root)
        run: |
          curl -L -o yingshicang.json http://abc.apei583.top:5244/d/APP/shuju/yingshicang.json
          echo "✅ yingshicang.json downloaded to root"
      
      - name: Download ysc.json (root)
        run: |
          curl -L -o ysc.json http://abc.apei583.top:5244/d/APP/shuju/ysc.json
          echo "✅ ysc.json downloaded to root"
      
      - name: Download wangpan.json (root)
        run: |
          curl -L -o wangpan.json http://abc.apei583.top:5244/d/APP/shuju/wangpan.json
          echo "✅ wangpan.json downloaded to root"
      
      - name: Download zbql2.txt (zhibo)
        run: |
          mkdir -p zhibo
          curl -L -o zhibo/zbql2.txt https://tvbox.fcapp.indevs.in/zbql2.txt
          echo "✅ zbql2.txt downloaded to zhibo/"
      
      - name: Download zbql3.txt (zhibo)
        run: |
          curl -L -o zhibo/zbql3.txt https://tvbox.fcapp.indevs.in/zbql3.txt
          echo "✅ zbql3.txt downloaded to zhibo/"
      
      - name: Check if files changed
        id: verify
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "📌 Files unchanged, skipping commit"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "🔄 Files changed, will commit"
          fi
      
      - name: Commit and push changes
        if: steps.verify.outputs.changed == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          git commit -m "chore: sync tvbox files from external source [$(date +'%Y-%m-%d %H:%M:%S')]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
